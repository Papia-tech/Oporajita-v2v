<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SafeSphere - Community Stories</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ==================== COLOR MANAGEMENT SYSTEM ==================== */
        :root {
            /* Branding Accent & Key Highlights */
            --accent-color: #941E26;
            --accent-hover: #75161c;
            
            /* Dynamic Theme Context (Default: Light Mode) */
            --bg-light: #E7D1A9;
            --text-dark: #2c1a11;
            --text-muted: #655546;
            --badge-bg: #fdfaf4;
            --badge-border: #e1d4be;
            
            /* Card backgrounds match index layout warm cream palette */
            --card-bg: #f3dfba;
            --card-border: rgba(148, 30, 38, 0.15);
            --control-bg: #e1d4be;
            --dot-inactive: #e1d4be;

            /* Floating Navbar Styles */
            --nav-bg: rgba(231, 209, 169, 0.6);
            --nav-border: rgba(44, 26, 17, 0.15);
            --nav-text: #3e2b1c;
        }

        /* Dark Mode Override Matrix for the ENTIRE Document Page */
        body[data-theme="dark"] {
            --bg-light: #0d0f14;
            --text-dark: #f1ebd9;
            --text-muted: #a3aab5;
            --badge-bg: #161a23;
            --badge-border: #2c3545;
            
            --card-bg: #161a23;
            --card-border: rgba(255, 255, 255, 0.05);
            --control-bg: #1c222e;
            --dot-inactive: #2c3545;
            
            --nav-bg: rgba(22, 26, 35, 0.5);
            --nav-border: rgba(255, 255, 255, 0.1);
            --nav-text: #ffffff;
        }

        /* Reset and Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            transition: background-color 0.3s, color 0.3s;
        }

        html {
  /* Firefox: sets width to thin, and handle to brown (track transparent) */
  scrollbar-width: thin;
  scrollbar-color: var(--accent-color) transparent; 
}

/* Chrome, Safari, and newer Edge */
html::-webkit-scrollbar {
  width: 4px;  /* Makes vertical scrollbar very thin */
  height: 4px; /* Makes horizontal scrollbar very thin */
}

/* Track (background) remains transparent */
html::-webkit-scrollbar-track {
  background: transparent; 
}

/* Thumb (the draggable handle) becomes brown */
html::-webkit-scrollbar-thumb {
  background-color: var(--accent-color); /* Your brown accent */
  border-radius: 4px;        /* Softens the edges */
}

/* Optional: Darkens slightly when the user hovers over it */
html::-webkit-scrollbar-thumb:hover {
  background-color: var(--accent-hover); 
}

        /* ==================== DEDICATED ALL STORIES VIEW CONTAINER ==================== */
        .all-stories-section {
            padding: 60px 8% 160px 8%;
            position: relative;
            min-height: 100vh;
        }

        .mandala1 {
            width: 400px;
            height: auto;
            position: absolute;
            transform: translateY(-50%);
            top: 0;
            right: 0;
            opacity: 0.2;
            pointer-events: none;
        }

        .mandala2 {
            width: 400px;
            height: auto;
            position: absolute;
            transform: rotate(180deg);
            bottom: 0;
            left: 0;
            opacity: 0.2;
            pointer-events: none;
        }

        body[data-theme="dark"] .mandala1, body[data-theme="dark"] .mandala2 {
            opacity: 0.08;
            filter: invert(1);
        }

        .section-badge {
            background-color: rgba(148, 30, 38, 0.15);
            color: var(--accent-color);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 20px;
            margin-bottom: 15px;
            display: inline-block;
            margin-top: 40px;
        }

        .section-title {
            font-family: 'Georgia', serif;
            font-size: 48px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
            position: relative;
            transition: color 0.3s;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 50px;
            height: 3px;
            background-color: var(--accent-color);
            margin: 15px 0 0 0;
            border-radius: 2px;
        }

        .section-subtitle {
            font-size: 16px;
            color: var(--text-muted);
            margin-top: 15px;
            transition: color 0.3s;
        }

        /* Grid Framework Layout */
        .all-stories-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 1200px;
            margin: 50px auto 0 auto;
        }

        .story-card {
            background-color: var(--card-bg); 
            border-radius: 16px;
            border: 1px solid var(--card-border);
            border-top: 4px solid var(--accent-color); 
            padding: 40px 50px;
            position: relative;
            box-shadow: 0 15px 35px rgba(0,0,0,0.06);
            transition: background-color 0.3s, border 0.3s, box-shadow 0.3s;
            z-index: 50;
        }

        body[data-theme="dark"] .story-card {
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        .story-badge {
            background-color: rgba(148, 30, 38, 0.1);
            color: var(--accent-color);
            font-size: 12px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 15px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .story-card::before {
            content: '“';
            position: absolute;
            top: 20px;
            right: 40px;
            font-family: 'Georgia', serif;
            font-size: 120px;
            color: rgba(148, 30, 38, 0.06);
            line-height: 1;
        }

        .story-title {
            font-family: 'Georgia', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 20px;
            transition: color 0.3s;
        }

        .story-text {
            font-size: 15px;
            line-height: 1.7;
            color: var(--text-muted);
            margin-bottom: 30px;
            transition: color 0.3s;
        }

        .story-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--card-border);
            padding-top: 25px;
            transition: border 0.3s;
        }

        .story-meta {
            display: flex;
            align-items: center;
            gap: 20px;
            font-size: 13px;
            color: var(--text-muted);
            transition: color 0.3s;
        }

        .story-likes {
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* ==================== FLOATING BOTTOM NAVBAR ==================== */
        .bottom-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 84%;
            max-width: 1200px;
            background: var(--nav-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--nav-border);
            border-radius: 50px;
            padding: 15px 40px;
            display: grid;
            grid-template-columns: 200px 1fr 200px;
            align-items: center;
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            transition: background-color 0.3s, border 0.3s;
        }

        .bottom-nav .logo {
            position: static;
            width: auto;
            height: auto;
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 1px;
            color: var(--nav-text);
            text-decoration: none;
            transition: color 0.3s;
            justify-self: start;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 35px;
            justify-self: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--nav-text);
            font-size: 15px;
            font-weight: 600;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background-color: var(--accent-color);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-links a:hover {
            color: var(--accent-color);
        }

        /* Set active state for tracking navigation indicators rules */
        .nav-links li.active-page a {
            color: var(--accent-color);
        }
        .nav-links li.active-page a::after {
            width: 100%;
        }

        .right-menu-group {
            justify-self: end;
            display: flex;
            align-items: center;
        }

        .theme-toggle-btn {
            background: transparent;
            border: none;
            color: var(--nav-text);
            font-size: 18px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.3s, transform 0.2s;
        }

        .theme-toggle-btn:hover {
            color: var(--accent-color);
            transform: rotate(15deg);
        }

        /* Floating Back-To-Top module */
        .scroll-top-btn {
            position: fixed;
            bottom: 30px;
            right: 4%;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--accent-color);
            color: #ffffff;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            text-decoration: none;
            z-index: 998;
            transition: background 0.3s;
        }

        .scroll-top-btn:hover {
            background-color: var(--accent-hover);
        }

        /* ==================== RESPONSIVE LAYOUT MATRIX ==================== */
        @media (max-width: 1024px) {
            .bottom-nav { width: 92%; display: flex; justify-content: space-between; }
            .all-stories-grid { grid-template-columns: 1fr; }
        }

        @media (max-width: 650px) {
            .bottom-nav {
                border-radius: 20px;
                flex-direction: column;
                gap: 15px;
                bottom: 15px;
                padding: 15px;
            }
            .nav-links { flex-direction: column; gap: 10px; align-items: center; }
            .section-title { font-size: 34px; }
            .story-card { padding: 30px 24px; }
            .story-title { font-size: 24px; }
        }
    </style>
</head>
<body>

    <section class="all-stories-section">
        <img class="mandala1" src="assets/images/mandala.png" alt="Mandala Decoration">
        <img class="mandala2" src="assets/images/mandala2.png" alt="Mandala Decoration">
        
        <div class="section-badge">Community Archive</div>
        <h2 class="section-title">All Existing Stories</h2>
        <p class="section-subtitle">Explore historical data footprints posted safely and anonymously by our network users.</p>

        <div class="all-stories-grid" id="storiesOutputGrid">
            </div>

        <nav class="bottom-nav">
            <a href="index.html" class="logo">Birangana</a>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li class="active-page"><a href="stories.html">Stories</a></li>
                <li><a href="share-stories.html">Share Story</a></li>
                <li><a href="resources.html">Resources</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            
            <div class="right-menu-group">
                <button class="theme-toggle-btn" id="themeToggle" title="Toggle Theme Layout">
                    <i class="fa-solid fa-moon" id="toggleIcon"></i>
                </button>
            </div>
        </nav>
    </section>

    <a href="#" class="scroll-top-btn">
        <i class="fa-solid fa-arrow-up"></i>
    </a>

    <script>
        // Theme Switcher Logic 
        const themeToggleBtn = document.getElementById('themeToggle');
        const toggleIcon = document.getElementById('toggleIcon');

        // Maintain persistent dark/light data properties matching your landing configurations
        if(localStorage.getItem('theme') === 'dark') {
            document.body.setAttribute('data-theme', 'dark');
            toggleIcon.className = 'fa-solid fa-sun';
        }

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = document.body.getAttribute('data-theme');
            if (currentTheme === 'dark') {
                document.body.removeAttribute('data-theme');
                toggleIcon.className = 'fa-solid fa-moon';
                localStorage.setItem('theme', 'light');
            } else {
                document.body.setAttribute('data-theme', 'dark');
                toggleIcon.className = 'fa-solid fa-sun';
                localStorage.setItem('theme', 'dark');
            }
        });

        // Exact original Data Matrix Array preserved cleanly
        let storiesData = [];

        async function loadStories() {
            try {
                const response = await fetch("https://oporajita-v2v.onrender.com/api/stories");
                const data = await response.json();

                storiesData = data.map(item => ({
                    title: item.title,
                    text: item.story,
                    likes: 0,
                    author: item.anonymousName
                }));
                populateStoriesGrid();

            } catch (error) {
                console.error(error);
            }
        }

        // Function rendering grid entries using native layout logic
        function populateStoriesGrid() {
            const grid = document.getElementById('storiesOutputGrid');
            grid.innerHTML = '';
            storiesData.forEach(story => {
                grid.innerHTML += `
                    <div class="story-card">
                        <div class="story-badge">Story</div>
                        <h3 class="story-title">${story.title}</h3>
                        <p class="story-text">${story.text}</p>
                        <div class="story-footer">
                            <div></div>
                            <div class="story-meta">
                                <span class="story-likes"><i class="fa-solid fa-heart"></i> <span>${story.likes}</span></span>
                                <span class="story-author">${story.author}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Run deployment 
       loadStories();
    </script>
</body>
</html>
